<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Frigorífico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card .card-body {
            padding: 2rem;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 1.75rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.65rem 1rem;
            border: 1px solid #e0e0e0;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }
        .btn-entrar {
            border-radius: 10px;
            padding: 0.65rem 1.5rem;
            font-weight: 500;
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="card login-card bg-white">
        <div class="card-body">
            <h1 class="login-title">Frigorífico</h1>
            <p class="login-subtitle">Entre com seu usuário e senha</p>
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuário</label>
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="Seu usuário" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label">Senha</label>
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="Sua senha" required>
                </div>
                {% if form.errors %}
                    <div class="alert alert-danger py-2 mb-3">
                        Usuário ou senha incorretos.
                    </div>
                {% endif %}
                <input type="hidden" name="next" value="{{ next|default:'/' }}">
                <button type="submit" class="btn btn-primary btn-entrar w-100">Entrar</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
